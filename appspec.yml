version: 0.0

os: linux

files:
  - source: /
    destination: /home/ec2-user/aws-native-cicd-project

hooks:
  BeforeInstall:
    - location: scripts/stop_application.sh
      timeout: 120
      runas: ec2-user

  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: ec2-user

  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 300
      runas: ec2-user
